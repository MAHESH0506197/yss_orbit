# yss_orbit\infra\kubernetes\overlays\development\kustomization.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: yss-orbit-development

resources:
  - ../../base

replicas:
  - name: yss-orbit-api
    count: 1
  - name: yss-orbit-celery
    count: 1

patches:
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 256Mi
    target:
      kind: Deployment
      name: yss-orbit-api

configMapGenerator:
  - name: app-config
    literals:
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG
