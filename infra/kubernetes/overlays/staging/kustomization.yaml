# yss_orbit\infra\kubernetes\overlays\staging\kustomization.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: yss-orbit-staging

resources:
  - ../../base

replicas:
  - name: yss-orbit-api
    count: 2
  - name: yss-orbit-celery
    count: 2

patches:
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 512Mi
    target:
      kind: Deployment
      name: yss-orbit-api

configMapGenerator:
  - name: app-config
    literals:
      - ENVIRONMENT=staging
      - LOG_LEVEL=DEBUG
