# yss_orbit\infra\kubernetes\base\celery.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  labels:
    app: celery-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      containers:
      - name: celery-worker
        image: yss-orbit-backend:latest
        imagePullPolicy: IfNotPresent
        command: ["celery", "-A", "core.celery_app", "worker", "-l", "info"]
        envFrom:
        - configMapRef:
            name: app-config
        - secretRef:
            name: app-secrets
