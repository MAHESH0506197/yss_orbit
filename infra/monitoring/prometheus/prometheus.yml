# yss_orbit\infra\monitoring\prometheus\prometheus.yml
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "rules/alerts.yml"
  - "rules/recording.yml"

scrape_configs:
  - job_name: 'yss-orbit-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/api/v1/metrics/'

  - job_name: 'celery-worker'
    static_configs:
      - targets: ['celery-exporter:9540']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
